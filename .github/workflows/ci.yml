name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build & checks (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          swift --version
          swift --version | grep -qE 'version (5\.1[0-9]|[6-9]\.)' \
            || { echo "::error::Swift < 5.10 (package requires swift-tools 5.10)"; exit 1; }

      - name: Build (release)
        working-directory: macos
        run: swift build -c release

      - name: Assertion checks
        working-directory: macos
        run: swift run -c release checks

      - name: Assemble .app (ad-hoc)
        working-directory: macos
        run: ./scripts/make_app.sh

      - name: Verify bundle signature
        working-directory: macos
        run: codesign --verify --deep --strict --verbose=2 "build/Limit Monitor.app"

  go-core:
    name: Go core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: go vet
        working-directory: go
        run: go vet ./...

      - name: go test
        working-directory: go
        run: go test ./...

      - name: Cross-compile (all targets, CGO_ENABLED=0)
        working-directory: go
        shell: bash
        run: |
          set -euo pipefail
          for GOOS in linux windows darwin; do
            for GOARCH in amd64 arm64; do
              echo "==> $GOOS/$GOARCH"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build ./...
            done
          done
