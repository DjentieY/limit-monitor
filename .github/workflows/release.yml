name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build, package & publish
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: |
          swift --version
          swift --version | grep -qE 'version (5\.1[0-9]|[6-9]\.)' \
            || { echo "::error::Swift < 5.10 (package requires swift-tools 5.10)"; exit 1; }

      - name: Verify (build + checks)
        working-directory: macos
        run: |
          swift build -c release
          swift run -c release checks

      - name: Check tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(cat VERSION)"
          if [[ "$tag" != "$file" ]]; then
            echo "::error::tag v$tag does not match VERSION file ($file)"
            exit 1
          fi

      - name: Package .app (arm64)
        working-directory: macos
        run: ./scripts/package_release.sh

      - name: Release notes from CHANGELOG
        run: |
          ./scripts/release_notes.sh "$(cat VERSION)" > RELEASE_NOTES.md
          echo "--- notes ---"; cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(macos/dist/*.zip macos/dist/*.zip.sha256)
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            # Idempotent: a re-run of the workflow updates the existing release.
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
            gh release edit "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
              --title "Limit Monitor ${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
          fi
